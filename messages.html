<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Messages - Freelancer</title>
<link rel="stylesheet" href="freelancer.css">
</head>
<body>
  <div class="fm-hero">
    <div class="fm-hero-eyebrow">Chat</div>
    <h1>Messages</h1>
    <p>Chat with your clients.</p>
  </div>

  <div class="fm-messages-shell">
    <div class="fm-conv-list" id="fm-conv-list"></div>
    <div class="fm-chat">
      <div class="fm-chat-head" id="fm-chat-head"></div>
      <div class="fm-chat-body" id="fm-chat-body"></div>
      <div class="fm-chat-input">
        <input class="fm-input" id="fm-msg-input" placeholder="Type a message...">
        <button class="fm-btn" id="fm-send-btn">Send</button>
      </div>
    </div>
  </div>

<script src="store.js"></script>
<script src="sidebar.js"></script>
<script>
  renderChrome("messages");
  let activeId = null;

  function renderConvList() {
    const data = Store.get();
    if (!activeId && data.messages.length) activeId = data.messages[0].id;
    document.getElementById("fm-conv-list").innerHTML = data.messages.map(m => {
      const last = m.thread[m.thread.length - 1];
      return `
      <div class="fm-conv-item ${m.id === activeId ? 'active' : ''}" data-id="${m.id}">
        <img src="${m.avatar}" alt="">
        <div>
          <div class="fm-conv-name">${m.contact}</div>
          <div class="fm-conv-preview">${last ? last.text : ""}</div>
        </div>
      </div>`;
    }).join("");
    document.querySelectorAll(".fm-conv-item").forEach(el => {
      el.addEventListener("click", () => { activeId = el.dataset.id; renderConvList(); renderChat(); });
    });
  }

  function renderChat() {
    const data = Store.get();
    const conv = data.messages.find(m => m.id === activeId);
    if (!conv) { document.getElementById("fm-chat-head").innerHTML = ""; document.getElementById("fm-chat-body").innerHTML = `<div class="fm-empty">Select a conversation.</div>`; return; }
    document.getElementById("fm-chat-head").innerHTML = `<img src="${conv.avatar}"><div><strong>${conv.contact}</strong></div>`;
    document.getElementById("fm-chat-body").innerHTML = conv.thread.map(t => `
      <div class="fm-msg ${t.from}">${t.text}<div class="fm-msg-time">${t.time}</div></div>`).join("");
    const body = document.getElementById("fm-chat-body");
    body.scrollTop = body.scrollHeight;
  }

  function sendMsg() {
    const input = document.getElementById("fm-msg-input");
    const text = input.value.trim();
    if (!text || !activeId) return;
    Store.update(d => {
      const conv = d.messages.find(m => m.id === activeId);
      conv.thread.push({ from: "me", text, time: "Now" });
    });
    input.value = "";
    renderConvList();
    renderChat();
  }

  document.getElementById("fm-send-btn").addEventListener("click", sendMsg);
  document.getElementById("fm-msg-input").addEventListener("keydown", e => { if (e.key === "Enter") sendMsg(); });

  renderConvList();
  renderChat();
</script>
</body>
</html>
