<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio - Freelancer</title>
<link rel="stylesheet" href="freelancer.css">
</head>
<body>
  <div class="fm-hero">
    <div class="fm-hero-eyebrow">Showcase</div>
    <h1>Portfolio</h1>
    <p>Showcase your best work to clients.</p>
  </div>

  <div class="fm-portfolio-grid" id="fm-portfolio-grid"></div>

  <div class="fm-modal-overlay" id="fm-modal">
    <div class="fm-modal">
      <h3>Add New Project</h3>
      <div class="fm-field"><label>Project Title</label><input class="fm-input" id="fm-p-title"></div>
      <div class="fm-field"><label>Description</label><textarea id="fm-p-desc" rows="3"></textarea></div>
      <div class="fm-field"><label>Image URL (leave blank for default)</label><input class="fm-input" id="fm-p-img"></div>
      <div class="fm-modal-actions">
        <button class="fm-btn outline" id="fm-p-cancel">Cancel</button>
        <button class="fm-btn" id="fm-p-save">Save</button>
      </div>
    </div>
  </div>

<script src="store.js"></script>
<script src="sidebar.js"></script>
<script>
  renderChrome("portfolio");

  function renderPortfolio() {
    const data = Store.get();
    const cards = data.portfolio.map(p => `
      <div class="fm-portfolio-card">
        <img src="${p.image}" alt="${p.title}">
        <div class="fm-portfolio-card-body">
          <h3>${p.title}</h3>
          <p>${p.description}</p>
          <button class="fm-btn danger delete-btn" data-id="${p.id}">Delete</button>
        </div>
      </div>`).join("");
    document.getElementById("fm-portfolio-grid").innerHTML = cards + `
      <button class="fm-add-card" id="fm-add-open">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14m-7-7h14"/></svg>
        Add New Project
      </button>`;

    document.getElementById("fm-add-open").addEventListener("click", () => document.getElementById("fm-modal").classList.add("show"));
    document.querySelectorAll(".delete-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        if (!confirm("Delete this project?")) return;
        Store.update(d => { d.portfolio = d.portfolio.filter(p => p.id !== btn.dataset.id); });
        toast("Project deleted.");
        renderPortfolio();
      });
    });
  }

  document.getElementById("fm-p-cancel").addEventListener("click", () => document.getElementById("fm-modal").classList.remove("show"));
  document.getElementById("fm-p-save").addEventListener("click", () => {
    const title = document.getElementById("fm-p-title").value.trim();
    const desc = document.getElementById("fm-p-desc").value.trim();
    let img = document.getElementById("fm-p-img").value.trim();
    if (!title) { toast("Please enter a project title."); return; }
    if (!img) img = "https://picsum.photos/seed/" + encodeURIComponent(title) + "/400/260";
    Store.update(d => { d.portfolio.push({ id: "p" + Date.now(), title, description: desc, image: img }); });
    document.getElementById("fm-p-title").value = "";
    document.getElementById("fm-p-desc").value = "";
    document.getElementById("fm-p-img").value = "";
    document.getElementById("fm-modal").classList.remove("show");
    toast("Project added!");
    renderPortfolio();
  });

  renderPortfolio();
</script>
</body>
</html>
