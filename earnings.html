<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earnings - Freelancer</title>
<link rel="stylesheet" href="freelancer.css">
</head>
<body>
  <div class="fm-earn-hero">
    <div>
      <div class="fm-earn-hero-label">Baki Semasa</div>
      <div class="fm-earn-hero-value" id="fm-balance">RM 0</div>
    </div>
    <button class="fm-btn" style="background:#fff;color:#6C4CE0;" id="fm-withdraw-btn">Withdraw</button>
  </div>

  <div class="fm-panel">
    <h2>Sejarah Transaksi</h2>
    <table class="fm-table">
      <thead><tr><th>Date</th><th>Description</th><th>Amount</th></tr></thead>
      <tbody id="fm-history-body"></tbody>
    </table>
  </div>

  <div class="fm-modal-overlay" id="fm-modal">
    <div class="fm-modal">
      <h3>Withdraw Earnings</h3>
      <div class="fm-field"><label>Amount (RM)</label><input class="fm-input" id="fm-w-amount" type="number" min="1"></div>
      <div class="fm-modal-actions">
        <button class="fm-btn outline" id="fm-w-cancel">Cancel</button>
        <button class="fm-btn" id="fm-w-save">Withdraw</button>
      </div>
    </div>
  </div>

<script src="store.js"></script>
<script src="sidebar.js"></script>
<script>
  renderChrome("earnings");

  function renderEarnings() {
    const data = Store.get();
    document.getElementById("fm-balance").textContent = fmtRM(data.earnings.balance);
    const rows = data.earnings.history.map(h => `
      <tr><td>${h.date}</td><td>${h.desc}</td><td style="font-weight:600;color:${h.amount < 0 ? '#E14B4B' : '#1FAA6D'}">${h.amount < 0 ? '-' : '+'}${fmtRM(Math.abs(h.amount))}</td></tr>`).join("");
    document.getElementById("fm-history-body").innerHTML = rows || `<tr><td colspan="3" class="fm-empty">No transactions yet.</td></tr>`;
  }

  document.getElementById("fm-withdraw-btn").addEventListener("click", () => document.getElementById("fm-modal").classList.add("show"));
  document.getElementById("fm-w-cancel").addEventListener("click", () => document.getElementById("fm-modal").classList.remove("show"));
  document.getElementById("fm-w-save").addEventListener("click", () => {
    const amt = Number(document.getElementById("fm-w-amount").value);
    const data = Store.get();
    if (!amt || amt <= 0) { toast("Please enter a valid amount."); return; }
    if (amt > data.earnings.balance) { toast("Insufficient balance."); return; }
    Store.update(d => {
      d.earnings.balance -= amt;
      d.earnings.history.unshift({ id: "e" + Date.now(), date: new Date().toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }), desc: "Withdrawal to bank", amount: -amt });
    });
    document.getElementById("fm-w-amount").value = "";
    document.getElementById("fm-modal").classList.remove("show");
    toast("Withdrawal successful!");
    renderEarnings();
  });

  renderEarnings();
</script>
</body>
</html>
