<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Client Dashboard</title>
  <link rel="stylesheet" href="client-style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="client-dashboard-body">
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">
          <img src="https://i.postimg.co/N0Mszp57/F-Logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none';">
          <div class="brand-text-group">
            <span class="brand-title">Freelance</span>
            <span class="brand-subtitle">Marketplace</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-menu">
        <a href="dashboard_client.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="jobs_client.html" class="menu-item"><i class="fa-solid fa-circle-plus"></i> Post a Job</a>
        <a href="myjob_client.html" class="menu-item"><i class="fa-solid fa-file-lines"></i> My Jobs</a>
        <a href="message_client.html" class="menu-item"><i class="fa-solid fa-comment-dots"></i> Messages</a>
        <a href="payment_client.html" class="menu-item"><i class="fa-solid fa-credit-card"></i> Payment</a>
        <a href="savedLancer_client.html" class="menu-item"><i class="fa-solid fa-star"></i> Saved Freelancers</a>
        <a href="review_client.html" class="menu-item"><i class="fa-solid fa-star-half-stroke"></i> Review</a>
        <a href="profile_client.html" class="menu-item"><i class="fa-solid fa-user"></i> Profile</a>
        <a href="settings_client.html" class="menu-item active"><i class="fa-solid fa-gear"></i> Settings</a>
        <a href="../index.html" class="menu-item" style="margin-top: 20px; border-top: 1px solid var(--border-line); padding-top: 16px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <header class="content-header">
        <div class="header-controls-left"></div>
        <div class="header-controls-right">
          <button class="notification-btn"><i class="fa-regular fa-bell"></i></button>
          <div class="profile-dropdown-trigger">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Taylor" alt="User Avatar" class="profile-avatar">
            <div class="user-info-text">
              <span class="profile-name">Taylor Sweety</span>
              <span class="profile-role">Client</span>
            </div>
            <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
          </div>
        </div>
      </header>
      <section class="welcome-text-section">
        <span class="welcome-tag">Welcome back,</span>
        <h1 class="welcome-heading">Taylor Sweety! 👋</h1>
      </section>
      <section class="workspace-panel-card">
        <div class="panel-header-row">
          <h3 class="panel-title-text">Account Settings</h3>
          <p class="panel-subtitle-text">Update your account preferences and profile settings.</p>
        </div>
        <div class="form-grid">
          <div class="panel-form-card">
            <div class="field-row single">
              <div>
                <label class="input-label" for="displayName">Display Name</label>
                <input id="displayName" type="text" placeholder="Taylor Sweety">
              </div>
            </div>
            <div class="field-row two">
              <div>
                <label class="input-label" for="emailAddress">Email</label>
                <input id="emailAddress" type="text" placeholder="taylor@example.com">
              </div>
              <div>
                <label class="input-label" for="phoneNumber">Phone</label>
                <input id="phoneNumber" type="text" placeholder="012-3456789">
              </div>
            </div>
            <div class="field-row single">
              <div>
                <label class="input-label">Notifications</label>
                <div class="checkbox-group">
                  <label class="radio-label"><input type="checkbox" checked> Email alerts</label>
                  <label class="radio-label"><input type="checkbox"> SMS updates</label>
                </div>
              </div>
            </div>
            <div class="button-group">
              <button class="btn-secondary">Cancel</button>
              <button class="btn-primary">Save Changes</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
